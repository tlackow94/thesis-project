    <h1>Map</h1>

  <div id="sidebar">
  <h3>Study Areas</h3>
<button onclick="zoomTo(-13069854, 4058901)">Study Area 1</button>
<button onclick="zoomTo(-13077117, 4074872)">Study Area 2</button>
<button onclick="zoomTo(-13044865, 3968891)">Study Area 3</button>
<button onclick="zoomTo(-13043455, 3980850)">Study Area 4</button>
</div>

    
    <div id="mapDiv"></div>
    <script>
    var view;

  require([
    "esri/Map",
    "esri/views/MapView",
    "esri/layers/FeatureLayer"
  ], function(Map, MapView, FeatureLayer) {

    var map = new Map({
      basemap: "streets-navigation-vector"
    });

    view = new MapView({
      container: "mapDiv",
      map: map,
      center: [-117.5, 34.0],
      zoom: 9
    });

   var featureLayer = new FeatureLayer({
  url: "https://services.arcgis.com/o6oETlrWetREI1A2/arcgis/rest/services/Thesis_Project_Locations/FeatureServer/8",
  popupTemplate: {
    title: "Study Area {Id}",
    content: "Area: {Shape__Area} square meters"
  }
});

    map.add(featureLayer);
  });
      function zoomTo(x, y) {
  view.goTo({
    target: {
      x: x,
      y: y,
      spatialReference: { wkid: 102100 }
    },
    zoom: 14
  });
}
</script>
  </body>
</html>
