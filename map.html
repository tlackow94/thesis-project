    <h1>Map</h1>

  <div id="sidebar">
  <h3>Study Areas</h3>
  <button onclick="zoomTo(-117.44, 34.14)">Study Area 1</button>
  <button onclick="zoomTo(-117.50, 34.40)">Study Area 2</button>
  <button onclick="zoomTo(-117.20, 33.30)">Study Area 3</button>
  <button onclick="zoomTo(-117.19, 33.40)">Study Area 4</button>
</div>

    
    <div id="mapDiv"></div>
    <script>
  require([
    "esri/Map",
    "esri/views/MapView",
    "esri/layers/FeatureLayer"
  ], function(Map, MapView, FeatureLayer) {

    var map = new Map({
      basemap: "streets-navigation-vector"
    });

    var view = new MapView({
      container: "mapDiv",
      map: map,
      center: [-117.5, 34.0], // Southern California
      zoom: 9
    });

   var featureLayer = new FeatureLayer({
  url: "https://services.arcgis.com/o6oETlrWetREI1A2/arcgis/rest/services/Thesis_Project_Locations/FeatureServer/8",
  popupTemplate: {
    title: "Study Area {Id}",
    content: "Area: {Shape__Area} square meters"
  }
});

    map.add(featureLayer);
  });
      function zoomTo(lon, lat) {
    view.goTo({
      center: [lon, lat],
      zoom: 14
           });
  }
</script>
  </body>
</html>
